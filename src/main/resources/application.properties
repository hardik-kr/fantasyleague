server.port = 9095

# Primary datasource: Fantasy League DB (write/read for fantasy entities)
spring.datasource.url=jdbc:mysql://localhost:3306/fantasyleague
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

# Exclude cricketapi-owned tables from Hibernate DDL (matches, team, player accessed via VIEWs)
spring.jpa.properties.hibernate.hbm2ddl.schema_filter_provider=com.cricket.fantasyleague.config.CricketApiSchemaFilterProvider

# Hibernate batching: collapses N individual statements into N/batch_size batches
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.order_inserts=true

# HTTP client to cricketapi: Authorization: Bearer <token> (must match cricketapi.universal-auth.token)
cricketapi.base-url=http://localhost:9090
cricketapi.universal-auth.token=fantasy-league-service-token

# Secondary datasource: Cricket API DB (READ-ONLY, no writes allowed)
cricketapi.datasource.url=jdbc:mysql://localhost:3306/cricketapi?readOnly=true
cricketapi.datasource.username=root
cricketapi.datasource.password=password
cricketapi.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Silence the "UserDetailsService won't be used" warning -- intentional, we wire it into DaoAuthenticationProvider manually
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR

# Smart scheduler (adaptive polling)
fantasy.smart.scheduler.enabled=true

# Free transfer windows: comma-separated match IDs where unlimited substitutions are allowed
# e.g. first match of season + mid-season reset match
fantasy.free-transfer-match-ids=149618

# IPL Fantasy external API (for player credit/type config)
fantasy.ipl.gamedayplayers.url=https://fantasy.iplt20.com/classic/api/feed/gamedayplayers?lang=en&tourgamedayId=1

